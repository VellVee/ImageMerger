<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JXL Image Merger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Image Merger</h1>
            <p>Drag, drop, crop, and merge your images.</p>
            
            <button id="menu-toggle-btn" class="menu-toggle-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"></path></svg>
            </button>
            
            <div id="settings-menu" class="settings-menu hidden">
                <div class="controls">
                    <label class="checkbox-container">
                        <input type="checkbox" id="auto-remove-black-bars">
                        <span class="checkmark"></span>
                        Auto-remove Black Bars
                    </label>
                    
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="direction" value="vertical" checked>
                            Vertical
                        </label>
                        <label>
                            <input type="radio" name="direction" value="horizontal">
                            Horizontal
                        </label>
                    </div>

                    <div class="format-group">
                        <label>Output Format:</label>
                        <select id="output-format">
                            <option value="jxl">JXL (99%)</option>
                            <option value="webp">WebP (99%)</option>
                            <option value="png">PNG (Lossless)</option>
                        </select>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <div class="action-buttons">
                <button id="remove-all-btn" class="danger-btn" disabled>Remove All</button>
                <button id="merge-btn" class="primary-btn" disabled>Merge & Download</button>
            </div>

            <div id="gallery" class="gallery"></div>

            <div id="drop-zone" class="drop-zone">
                <p>Drag & Drop Images Here</p>
                <span>or click to browse</span>
                <input type="file" id="file-input" multiple accept="image/*">
            </div>
        </main>
    </div>

    <!-- Crop Modal -->
    <div id="crop-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Crop Image</h2>
            <div class="crop-wrapper" id="crop-wrapper">
                <div class="crop-container" id="crop-container">
                    <img id="crop-image" src="" alt="Image to crop">
                </div>
            </div>
            <div class="crop-inputs">
                <label>Top <input type="number" id="crop-top"></label>
                <label>Bottom <input type="number" id="crop-bottom"></label>
                <label>Left <input type="number" id="crop-left"></label>
                <label>Right <input type="number" id="crop-right"></label>
            </div>
            <div class="modal-actions">
                <button id="cancel-crop-btn" class="secondary-btn">Cancel</button>
                <button id="save-crop-btn" class="primary-btn">Save Crop</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
